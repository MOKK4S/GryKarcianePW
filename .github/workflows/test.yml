name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore gry/gry.slnx

      - name: Build
        run: dotnet build gry/gry.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test gry/gry.slnx --no-build --configuration Release --verbosity normal
